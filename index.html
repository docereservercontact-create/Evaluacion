<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plataforma de Evaluaciones</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    margin: 0;
    color: white;
    text-align: center;
}

/* LOGO */
.logo {
    width: 120px;
    margin-top: 30px;
    margin-bottom: 10px;
    transition: 0.3s;
}

/* Efecto hover del logo */
.logo:hover {
    transform: scale(1.1);
}

h1 {
    margin-top: 10px;
}

.subtitulo {
    margin-bottom: 30px;
    opacity: 0.8;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 30px;
    max-width: 900px;
    margin: auto;
}

.card {
    background: white;
    color: #2c3e50;
    padding: 25px;
    border-radius: 15px;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    transition: all 0.3s ease;
}

.card:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<!-- LOGO -->
<img src="Logo.png" class="logo">

<h1>🎓 Plataforma de Evaluaciones</h1>
<p class="subtitulo">Selecciona una materia</p>

<div class="grid">

    <div class="card" onclick="abrir('Biologia')">🧬 Biología</div>
    <div class="card" onclick="abrir('Espanol')">📘 Español</div>
    <div class="card" onclick="abrir('Filosofia')">🤔 Filosofía</div>
    <div class="card" onclick="abrir('Fisica')">⚛️ Física</div>
    <div class="card" onclick="abrir('Geografia')">🌎 Geografía</div>
    <div class="card" onclick="abrir('Historia')">📜 Historia</div>
    <div class="card" onclick="abrir('Literatura')">📖 Literatura</div>
    <div class="card" onclick="abrir('Matematicas')">➗ Matemáticas</div>
    <div class="card" onclick="abrir('Quimica')">🧪 Química</div>

</div>

<script>
function abrir(ruta) {
    window.location.href = ruta;
}
</script>

</body>
</html>
